<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot Admitere TUIASI</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="page-chat">

<div id="chat-container">
    <div id="chat-header">Asistent Admitere AC</div>
    <div id="chat-messages">
        <div class="message bot-msg">Salut! Sunt asistentul tau virtual. Cu ce te pot ajuta legat de admitere?</div>
    </div>
    <div id="chat-input-area">
        <input type="text" id="chat-input" placeholder="Scrie un mesaj..." onkeypress="handleKeyPress(event)">
        <button id="send-btn" onclick="sendMessage()">Trimite</button>
    </div>
</div>

<script src="/static/script.js"></script>

</body>
</html>
