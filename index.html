<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot Admitere TUIASI</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        #chat-container { width: 400px; height: 500px; background: white; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); display: flex; flex-direction: column; overflow: hidden; }
        #chat-header { background: #004b87; color: white; padding: 15px; text-align: center; font-weight: bold; }
        #chat-messages { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .message { max-width: 80%; padding: 10px; border-radius: 10px; line-height: 1.4; }
        .user-msg { background: #007bff; color: white; align-self: flex-end; border-bottom-right-radius: 2px; }
        .bot-msg { background: #e9ecef; color: black; align-self: flex-start; border-bottom-left-radius: 2px; }
        #chat-input-area { display: flex; border-top: 1px solid #ddd; padding: 10px; }
        #chat-input { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 5px; outline: none; }
        #send-btn { background: #004b87; color: white; border: none; padding: 10px 15px; margin-left: 10px; border-radius: 5px; cursor: pointer; }
        #send-btn:hover { background: #00335e; }
        .source-tag { font-size: 0.7em; color: gray; margin-top: 5px; text-align: right; display: block; }
    </style>
</head>
<body>

<div id="chat-container">
    <div id="chat-header">Asistent Admitere AC</div>
    <div id="chat-messages">
        <div class="message bot-msg">Salut! Sunt asistentul tau virtual. Cu ce te pot ajuta legat de admitere?</div>
    </div>
    <div id="chat-input-area">
        <input type="text" id="chat-input" placeholder="Scrie un mesaj..." onkeypress="handleKeyPress(event)">
        <button id="send-btn" onclick="sendMessage()">Trimite</button>
    </div>
</div>

<script>
    const chatMessages = document.getElementById("chat-messages");
    const chatInput = document.getElementById("chat-input");

    async function sendMessage() {
        const text = chatInput.value.trim();
        if (!text) return;

        appendMessage(text, "user-msg");
        chatInput.value = "";

        const loadingId = appendMessage("Ma gandesc...", "bot-msg");

        try {
            const response = await fetch("http://127.0.0.1:8000/chat", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message: text })
            });

            const data = await response.json();

            document.getElementById(loadingId).remove();
            
            let formattedAnswer = data.answer.replace(/\n/g, "<br>");
            let sourceHtml = `<span class="source-tag">Sursa: ${data.source}</span>`;
            
            appendMessage(formattedAnswer + sourceHtml, "bot-msg", true);

        } catch (error) {
            document.getElementById(loadingId).remove();
            appendMessage("Eroare de conexiune cu serverul.", "bot-msg");
        }
    }

    function appendMessage(text, className, isHtml = false) {
        const msgDiv = document.createElement("div");
        msgDiv.className = `message ${className}`;
        msgDiv.id = "msg-" + Date.now() + "-" + Math.floor(Math.random() * 10000);
        
        if (isHtml) msgDiv.innerHTML = text;
        else msgDiv.textContent = text;
        
        chatMessages.appendChild(msgDiv);
        chatMessages.scrollTop = chatMessages.scrollHeight; 
        return msgDiv.id;
    }

    function handleKeyPress(event) {
        if (event.key === "Enter") {
            sendMessage();
        }
    }
</script>

</body>
</html>
